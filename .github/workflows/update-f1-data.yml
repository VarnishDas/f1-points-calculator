name: Update F1 data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.actor == 'VarnishDas'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch data and compare the race calendar
        run: pnpm data:update

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update F1 data and calendar"
          title: "chore: update F1 data and calendar"
          body: "Automated 2026 driver, constructor, result, and race calendar update from Jolpica."
          branch: data/update-f1-data
          delete-branch: true
          add-paths: |
            src/data/drivers.json
            src/data/teams.json
            src/data/races.json
            src/data/metadata.json
